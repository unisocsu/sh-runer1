name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # הגדרת סביבת Gradle תואמת (גרסה 8.5) כדי למנוע שגיאות גרסאות חדשות מדי
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    # יצירת קובץ ה-gradlew המבוקש בגרסה הנכונה
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    # מתן הרשאות הרצה לקובץ שנוצר
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # הרצת הבנייה של ה-APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # העלאת ה-APK המוכן ל-Artifacts של GitHub
    - name: Upload Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: ShellRunner-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
